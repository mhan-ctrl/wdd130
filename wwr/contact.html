<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting | Contact Us</title>
    <meta name="description" content="A page containing the contact info for 'White Water Rafting' company.">
    <meta name="author" content="Merrill Hansen">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="The Whitewater Rafting logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="contact">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </div>
        <div class="container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d49558.9150192672!2d-120.42276991637739!3d39.07385230639423!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x809bce64fbbef1ff%3A0xab49e1535613bda1!2sHell%20Hole%20Reservoir!5e0!3m2!1sen!2sus!4v1775941876559!5m2!1sen!2sus"
                  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="form-item1">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="First and Last">
                </div>
                <div class="form-item1">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="someone@email.com">
                </div>
                <div class="form-item2">
                    <p>Message Purpose</p>
                    <div class="radio">
                        <label><input type="radio" name="purpose" id="purpose" value="General Inquiry">General Inquiry</label>
                        <label><input type="radio" name="purpose" id="purpose" value="Reservation Question">Reservation Question</label>
                        <label><input type="radio" name="purpose" id="purpose" value="Website Suggestion">Website Suggestion</label>
                    </div>
                </div>
                <div class="form-item3">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4" placeholder="Type here"></textarea>
                </div>
                <div class="form-item4">
                    <label for="subscribe"><input type="checkbox" id="subscribe" name="subscribe">Please subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <section class="adventure">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/raft-employee-1.jpg" alt="Bob Burg">
                <figcaption>Bob Burg</figcaption>
            </figure>
            <figure>
                <img src="images/rafting-employee-2.jpg" alt="John Jingle">
                <figcaption>John Jingle</figcaption>
            </figure>
            <figure>
                <img src="images/raft-employee-3.jpg" alt="Dave Dewitt">
                <figcaption>Dave Dewitt</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2026 🌊 White Water Rafting 🌊 Merrill Hansen</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook-bw.svg" alt="Facebook Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram-bw.svg" alt="Instagram Icon"></a>
            <a href="https://youtube.com"><img src="images/youtube-bw.svg" alt="YouTube Icon"></a>
        </nav>
    </footer>
</body>

</html>
